              type: object
              properties:
                name:
                  type: string
                  description: 변경할 새로운 닉네임
                  example: '새로운 닉네임'
              required:
                - name
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: 업로드할 이미지 파일
              required:
                - image
      responses:
        '200':
          description: 정보 수정 성공
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: '닉네임 수정 시 반환되는 응답입니다.'
                    allOf:
                      - $ref: '#/components/schemas/BaseResponse'
                      - type: object
                        properties:
                          message:
                            example: '사용자 닉네임 수정 완료'
                          data:
                            type: object
                            properties:
                              nickname:
                                type: string
                                example: '변경된 사용자 닉네임'
                  - type: object
                    description: '프로필 이미지 수정 시 반환되는 응답입니다.'
                    allOf:
                      - $ref: '#/components/schemas/BaseResponse'
                      - type: object
                        properties:
                          message:
                            example: '사용자 프로필 이미지 수정 완료'
                          data:
                            type: object
                            properties:
                              profileImageUrl:
                                type: string
                                example: 'http://dcopei53cz7wg.cloudfront.net/profiles/user23.png'

        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: 'UNAUTHORIZED'
                      message:
                        type: string
                        example: '유효하지 않은 토큰입니다.'
              example:
                success: false
                error:
                  code: 'UNAUTHORIZED'
                  message: '유효하지 않은 토큰입니다.'

        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                BadRequest:
                  summary: 필수 필드 누락
                  value:
                    success: false
                    code: 'BAD_REQUEST'
                    message: '요청 형식이 올바르지 않습니다.'

                UploadError:
                  summary: 파일 업로드 실패
                  value:
                    success: false
                    code: 'UPLOAD_ERROR'
                    message: '파일 업로드 오류가 발생했습니다.'

                FileTooLarge:
                  summary: 파일 용량 초과
                  value:
                    success: false
                    code: 'FILE_TOO_LARGE'
                    message: '파일 용량이 너무 큽니다.'

                InvalidFileExt:
                  summary: 파일 형식 오류
                  value:
                    success: false
                    code: 'INVALID_FILE_EXT'
                    message: '허용되지 않는 파일 형식입니다.'

        '500':
          description: |
            **서버 내부 오류 발생**
            서버 측의 기술적인 문제로 인해 요청을 처리할 수 없는 상태입니다.
            - **INTERNAL_SERVER_ERROR**: 서버 내부 로직 처리 중 예상치 못한 예외가 발생한 경우입니다. (예: 런타임 에러, Null 참조 등)
            - **AWS_S3_ERROR**: 프로필 이미지 업로드 중 저장소(AWS S3)와의 통신에 실패하거나 권한 문제가 발생한 경우입니다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                ServerError:
                  summary: 서버 오류
                  value:
                    success: false
                    code: 'INTERNAL_SERVER_ERROR'
                    message: '서버 오류가 발생했습니다.'

                S3ServerError:
                  summary: AWS S3 서버 오류
                  value:
                    success: false
                    code: 'S3_SERVER_ERROR'
                    message: 'AWS S3 서버 오류가 발생했습니다.'

