openapi: 3.0.0

info:
  version: 1.0.0
  title: 등불 API 명세서
  description: 발등에 불 떨어지는 상황은 이제 싫다!!
  license:
    name: api명세서

servers:
  - url: http://localhost:3000

paths:
  /goals:
    post:
      tags:
        - 목표
      summary: 목표 생성
      description: 사용자의 새로운 목표를 생성합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - categoryId
                - detail
                - totalAmount
                - startDate
                - endDate
                - quota
              properties:
                title:
                  type: string
                  description: 목표 이름
                  example: 목표 4
                categoryId:
                  type: integer
                  description: 카테고리 ID
                  example: 1
                detail:
                  type: string
                  description: 목표 설명
                  example: 목표에 대한 설명입니다.
                totalAmount:
                  type: integer
                  description: 전체 목표 분량(목표 총량)
                  example: 400
                startDate:
                  type: string
                  format: date
                  description: 목표 수행 시작일
                  example: 2026-03-17
                endDate:
                  type: string
                  format: date
                  description: 목표 수행 종료일
                  example: 2026-04-17
                quota:
                  type: integer
                  description: 하루 할당량
                  example: 10
            example:
              title: 목표 4
              categoryId: 1
              detail: 목표에 대한 설명입니다.
              totalAmount: 400
              startDate: 2026-03-17
              endDate: 2026-04-17
              quota: 10
      responses:
        '201':
          description: 목표 생성 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 목표 생성 완료
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 4
                      title:
                        type: string
                        example: 목표 4
                      categoryId:
                        type: integer
                        example: 1
                      userName:
                        type: string
                        example: DFs43AEs
              example:
                success: true
                message: 목표 생성 완료
                data:
                  id: 4
                  title: 목표 4
                  categoryId: 1
                  userName: DFs43AEs
        '400':
          description: 잘못된 요청
          content:
            application/json:
              examples:
                BAD_REQUEST:
                  value:
                    success: false
                    error:
                      code: BAD_REQUEST
                      message: 필수값이 누락되었습니다.
                INVALID_DATE:
                  value:
                    success: false
                    error:
                      code: INVALID_DATE
                      message: 유효하지 않은 날짜 형식입니다.
                INVALID_DATE_RANGE:
                  value:
                    success: false
                    error:
                      code: INVALID_DATE_RANGE
                      message: 시작일은 종료일보다 늦을 수 없습니다.
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: 유효하지 않은 토큰입니다.
              example:
                success: false
                error:
                  code: UNAUTHORIZED
                  message: 유효하지 않은 토큰입니다.
        '404':
          description: 리소스를 찾을 수 없음
          content:
            application/json:
              examples:
                USER_NOT_FOUND:
                  value:
                    success: false
                    error:
                      code: USER_NOT_FOUND
                      message: 사용자를 찾을 수 없습니다.
                CATEGORY_NOT_FOUND:
                  value:
                    success: false
                    error:
                      code: CATEGORY_NOT_FOUND
                      message: 카테고리를 찾을 수 없습니다.
        '500':
          description: 서버 오류
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_SERVER_ERROR
                      message:
                        type: string
                        example: 서버 오류가 발생했습니다.
              example:
                success: false
                error:
                  code: INTERNAL_SERVER_ERROR
                  message: 서버 오류가 발생했습니다.
    get:
      tags:
        - 목표
      summary: 전체 목표 리스트 조회
      description: 사용자의 전체 목표 리스트를 조회합니다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 전체 목표 리스트 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 전체 목표 리스트
                  data:
                    type: object
                    properties:
                      goals:
                        type: array
                        description: 전체 목표 목록
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              description: 목표 ID
                              example: 1
                            title:
                              type: string
                              description: 목표 이름
                              example: 목표 1
                            endDate:
                              type: string
                              format: date
                              description: 마감 기한
                              example: 2026-03-20
                            description:
                              type: string
                              description: 목표에 대한 간단한 설명
                              example: 매일 알고리즘 2문제 이상 풀기
                            progressRate:
                              type: integer
                              description: 목표 진행도(%)
                              minimum: 0
                              maximum: 100
                              example: 73
              example:
                success: true
                message: 전체 목표 리스트
                data:
                  goals:
                    - id: 1
                      title: 목표 1
                      endDate: 2026-03-20
                      description: 목표에 대한 설명 간략하게 여기가 작성
                      progressRate: 73
                    - id: 2
                      title: 목표 2
                      endDate: 2026-03-21
                      description: 하루 1시간 이상 공부하기
                      progressRate: 45

        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: 유효하지 않은 토큰입니다.
              example:
                success: false
                error:
                  code: UNAUTHORIZED
                  message: 유효하지 않은 토큰입니다.

        '500':
          description: 서버 오류
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_SERVER_ERROR
                      message:
                        type: string
                        example: 서버 오류가 발생했습니다.
              example:
                success: false
                error:
                  code: INTERNAL_SERVER_ERROR
                  message: 서버 오류가 발생했습니다.

  /goals/{goalId}/detail: #/goals/:goalId/detail?startDate=?&endDate=?
    get:
      tags:
        - 목표
      summary: 개별 목표 상세 조회
      description: '특정 목표의 상세 정보와 기간별 일자 진행 현황을 조회합니다.'
      security:
        - bearerAuth: []

      parameters:
        - name: goalId
          in: path
          required: true
          description: 목표의 ID
          schema:
            type: integer
            example: 1

        - name: startDate
          in: query
          required: false
          description: '조회 시작 날짜 (YYYY-MM-DD, 기본값: today-7)'
          schema:
            type: string
            format: date
            example: 2026-03-14

        - name: endDate
          in: query
          required: false
          description: '조회 종료 날짜 (YYYY-MM-DD, 기본값: today+14)'
          schema:
            type: string
            format: date
            example: 2026-04-04

      responses:
        '200':
          description: 개별 목표 상세 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 개별 목표 상세 정보
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: 목표 ID
                        example: 1
                      title:
                        type: string
                        description: 목표 이름
                        example: 목표 1
                      description:
                        type: string
                        description: 목표 설명
                        example: 목표의 설명입니다.
                      category:
                        type: string
                        description: 목표 카테고리
                        example: 책

                      progress:
                        type: object
                        description: 목표 진행도 정보
                        properties:
                          rate:
                            type: integer
                            description: 진행률 (%)
                            example: 78
                          currentAmount:
                            type: integer
                            description: 현재 진행량
                            example: 78
                          targetAmount:
                            type: integer
                            description: 전체 목표량
                            example: 100
                          totalStudyTime:
                            type: integer
                            description: 해당 목표의 총 공부 시간
                            example: 876489473
                          unit:
                            type: string
                            description: 단위
                            example: 페이지

                      period:
                        type: object
                        description: 목표 기간 정보
                        properties:
                          startDate:
                            type: string
                            format: date
                            description: 목표 시작일
                            example: 2026-02-01
                          endDate:
                            type: string
                            format: date
                            description: 목표 종료일
                            example: 2026-03-30
                          daysRemaining:
                            type: integer
                            description: 목표 종료까지 남은 일수
                            example: 13

                      dailyProgress:
                        type: array
                        description: 날짜별 목표 진행 현황
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                              format: date
                              description: 날짜
                              example: 2026-03-14
                            targetAmount:
                              type: integer
                              description: 해당 일자의 목표 할당량
                              example: 3
                            completedAmount:
                              type: integer
                              description: 해당 일자의 실제 완료량
                              example: 3
                            isCompleted:
                              type: boolean
                              description: 해당 일자 목표 완료 여부
                              example: true
                            studyTime:
                              type: integer
                              description: 해당 일자의 해당 목표 공부 시간
                              example: 39334748
                            isToday:
                              type: boolean
                              description: 오늘 여부
                              example: false

              example:
                success: true
                message: 개별 목표 상세 정보
                data:
                  id: 1
                  title: 목표 1
                  description: 목표의 설명입니다.
                  category: 책
                  progress:
                    rate: 78
                    currentAmount: 78
                    targetAmount: 100
                    totalStudyTime: 876489473
                    unit: 페이지
                  period:
                    startDate: 2026-02-01
                    endDate: 2026-03-30
                    daysRemaining: 13
                  dailyProgress:
                    - date: 2026-03-14
                      targetAmount: 3
                      completedAmount: 3
                      isCompleted: true
                      studyTime: 39334748
                      isToday: false
                    - date: 2026-03-15
                      targetAmount: 4
                      completedAmount: 4
                      isCompleted: true
                      studyTime: 2733902
                      isToday: false
                    - date: 2026-03-16
                      targetAmount: 3
                      completedAmount: 3
                      isCompleted: true
                      studyTime: 2733902
                      isToday: false
                    - date: 2026-03-17
                      targetAmount: 5
                      completedAmount: 7
                      isCompleted: true
                      studyTime: 2836238
                      isToday: false
                    - date: 2026-03-18
                      targetAmount: 5
                      completedAmount: 3
                      isCompleted: false
                      studyTime: 2836238
                      isToday: false
                    - date: 2026-03-19
                      targetAmount: 3
                      completedAmount: 2
                      isCompleted: false
                      studyTime: 2836238
                      isToday: false
                    - date: 2026-03-20
                      targetAmount: 3
                      completedAmount: 3
                      isCompleted: true
                      studyTime: 2836238
                      isToday: false
                    - date: 2026-03-21
                      targetAmount: 3
                      completedAmount: 2
                      isCompleted: false
                      studyTime: 2836238
                      isToday: true
                    - date: 2026-03-22
                      targetAmount: 3
                      completedAmount: 0
                      isCompleted: false
                      studyTime: 2836238
                      isToday: false
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: BAD_REQUEST
                      message:
                        type: string
                        example: 유효한 goalId가 필요합니다.
              examples:
                invalidGoalId:
                  summary: goalId가 유효하지 않은 경우
                  value:
                    success: false
                    error:
                      code: BAD_REQUEST
                      message: 유효한 goalId가 필요합니다.
                invalidStartDate:
                  summary: startDate 형식 오류
                  value:
                    success: false
                    error:
                      code: BAD_REQUEST
                      message: startDate 형식은 YYYY-MM-DD 이어야 합니다.
                invalidEndDate:
                  summary: endDate 형식 오류
                  value:
                    success: false
                    error:
                      code: BAD_REQUEST
                      message: endDate 형식은 YYYY-MM-DD 이어야 합니다.
                invalidDateRange:
                  summary: 날짜 범위 오류
                  value:
                    success: false
                    error:
                      code: BAD_REQUEST
                      message: startDate는 endDate보다 늦을 수 없습니다.
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: 유효하지 않은 토큰입니다.
              example:
                success: false
                error:
                  code: UNAUTHORIZED
                  message: 유효하지 않은 토큰입니다.
        '404':
          description: 목표를 찾을 수 없음
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: GOAL_NOT_FOUND
                      message:
                        type: string
                        example: 해당 목표를 찾을 수 없습니다.

        '500':
          description: 서버 오류
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_SERVER_ERROR
                      message:
                        type: string
                        example: 서버 오류가 발생했습니다.
              example:
                success: false
                error:
                  code: INTERNAL_SERVER_ERROR
                  message: 서버 오류가 발생했습니다.

  /goals/{goalId}:
    patch:
      tags:
        - 목표
      summary: 개별 목표 수정
      description: 특정 goalId에 해당하는 목표의 목표량 또는 종료일을 수정합니다. targetValue와 endDate 중 하나만 전송해도 됩니다.
      security:
        - bearerAuth: []
      parameters:
        - name: goalId
          in: path
          required: true
          description: 목표 id
          schema:
            type: integer
            example: 1

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetValue:
                  type: integer
                  description: 변경할 목표량
                  example: 150
                endDate:
                  type: string
                  format: date
                  description: 변경할 목표 종료일
                  example: 2026-04-20
            examples:
              targetValueOnly:
                summary: 목표량만 수정
                value:
                  targetValue: 150
              endDateOnly:
                summary: 종료일만 수정
                value:
                  endDate: 2026-04-20
              both:
                summary: 목표량과 종료일 모두 수정
                value:
                  targetValue: 150
                  endDate: 2026-04-20

      responses:
        '200':
          description: 개별 목표 수정 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 목표 수정 성공
                  data:
                    type: object
                    description: 수정된 목표 상세 정보
              example:
                success: true
                message: 목표 수정 성공
                data:
                  id: 1
                  title: 목표 1
                  description: 목표의 설명입니다.
                  category: 책
                  progress:
                    rate: 78
                    currentAmount: 78
                    targetAmount: 100
                    unit: 페이지
                  period:
                    startDate: 2026-02-01
                    endDate: 2026-03-30
                    daysRemaining: 13
                  dailyProgress:
                    - date: 2026-03-14
                      quota: 3
                      isCompleted: true

        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: BAD_REQUEST
                      message:
                        type: string
                        example: 요청 형식이 올바르지 않습니다.
              examples:
                invalidGoalId:
                  summary: 잘못된 goalId
                  value:
                    success: false
                    error:
                      code: BAD_REQUEST
                      message: 유효한 goalId가 필요합니다.
                invalidRequestFormat:
                  summary: 요청 형식 오류
                  value:
                    success: false
                    error:
                      code: BAD_REQUEST
                      message: 요청 형식이 올바르지 않습니다.
                emptyUpdateData:
                  summary: 수정할 값 없음
                  value:
                    success: false
                    error:
                      code: EMPTY_UPDATE_DATA
                      message: 수정할 값이 없습니다.
                invalidTargetValue:
                  summary: 잘못된 targetValue
                  value:
                    success: false
                    error:
                      code: INVALID_TARGET_VALUE
                      message: targetValue는 1 이상의 정수여야 합니다.
                invalidDate:
                  summary: 잘못된 날짜 형식
                  value:
                    success: false
                    error:
                      code: INVALID_DATE
                      message: 유효하지 않은 날짜 형식입니다.
                invalidDateRange:
                  summary: 잘못된 날짜 범위
                  value:
                    success: false
                    error:
                      code: INVALID_DATE_RANGE
                      message: 종료일은 시작일보다 빠를 수 없습니다.

        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: 유효하지 않은 토큰입니다.
              example:
                success: false
                error:
                  code: UNAUTHORIZED
                  message: 유효하지 않은 토큰입니다.

        '404':
          description: 목표를 찾을 수 없음
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: GOAL_NOT_FOUND
                      message:
                        type: string
                        example: 해당 목표를 찾을 수 없습니다.
              example:
                success: false
                error:
                  code: GOAL_NOT_FOUND
                  message: 해당 목표를 찾을 수 없습니다.
        '500':
          description: 서버 오류
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: INTERNAL_SERVER_ERROR
                      message:
                        type: string
                        example: 서버 오류가 발생했습니다.
              example:
                success: false
                error:
                  code: INTERNAL_SERVER_ERROR
                  message: 서버 오류가 발생했습니다.

    delete:
      tags:
        - 목표
      summary: 목표 삭제
      description: 특정 goalId에 해당하는 목표를 삭제합니다.
