version: '3.8'

services:
  db:
    image: postgres:15-alpine # 가볍고 안정적인 PostgreSQL 15 버전
    container_name: lampfire-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER} # DB 접속 아이디
      POSTGRES_PASSWORD: ${DB_PASSWORD} # DB 접속 비밀번호
      POSTGRES_DB: ${DB_NAME} # 생성할 데이터베이스 이름
    ports:
      - '5432:5432' # [내 컴퓨터 포트]:[컨테이너 내부 포트]
    volumes:
      - db_data:/var/lib/postgresql/data # 컨테이너를 꺼도 데이터가 유지되도록 저장소 연결

volumes:
  db_data:
